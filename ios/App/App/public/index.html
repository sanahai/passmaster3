<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>BEAUTYmaster</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #ffffff;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        color: #757575;
      }
      .spinner {
        width: 42px;
        height: 42px;
        border: 4px solid #fce4ec;
        border-top-color: #d81b60;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      strong { color: #d81b60; }
    </style>
  </head>
  <body>
    <!--
      이 화면은 네트워크 연결 실패 등 예외 상황에서만 잠깐 보이는 대기 화면입니다.
      정상 동작 시 앱은 https://beautymaster.vercel.app 을 직접 로드합니다.
    -->
    <div class="wrap">
      <div class="spinner"></div>
      <div><strong>BEAUTYmaster</strong> 불러오는 중…</div>
    </div>
  </body>
</html>
